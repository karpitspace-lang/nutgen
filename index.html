<!DOCTYPE html>
<html lang="en">
<head>
    <title>NUTGEN | Parametric Nut Generator</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { --accent: #00ff41; --bg-dark: #0a0a0a; --panel: #141414; --text: #e0e0e0; }
        body { margin: 0; font-family: 'Courier New', Courier, monospace; display: flex; height: 100vh; background: var(--bg-dark); color: var(--text); overflow: hidden; }
        #sidebar { width: 350px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; z-index: 10; }
        .header { padding: 30px 20px; border-bottom: 1px solid #222; text-align: center; }
        h1 { margin: 0; font-size: 32px; color: var(--accent); letter-spacing: 4px; }
        .controls { padding: 25px; flex-grow: 1; }
        .control-item { margin-bottom: 25px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; background: #1a1a1a; color: var(--accent); border: 1px solid #333; outline: none; }
        .actions { padding: 20px; background: #0d0d0d; }
        button { width: 100%; padding: 15px; background: var(--accent); color: black; border: none; cursor: pointer; font-weight: bold; width: 100%; }
        #main-view { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #viewer { flex-grow: 1; background: #111; display: flex; align-items: center; justify-content: center; color: var(--accent); text-align: center; }
        #console { height: 180px; background: #050505; border-top: 1px solid #222; padding: 15px; font-size: 12px; color: #008f11; overflow-y: auto; font-family: monospace; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header"><h1>NUTGEN</h1><div style="font-size:10px; color:#666;">V1.1.0 // FIXED FILENAME LOGIC</div></div>
        <div class="controls">
            <div class="control-item">
                <label>Nominal Size</label>
                <select id="Nut_Size" onchange="previewOnly()">
                    <option value="M3" selected>M3</option>
                    <option value="M4">M4</option>
                    <option value="M5">M5</option>
                    <option value="M8">M8</option>
                </select>
            </div>
            <div class="control-item">
                <label>Tolerance (mm)</label>
                <input type="number" id="Tolerance" value="0.15" step="0.01" onchange="previewOnly()">
            </div>
        </div>
        <div class="actions"><button id="btn-generate" onclick="generateAndDownload()">Generate & Download STL</button></div>
    </div>

    <div id="main-view">
        <div id="viewer"><div><div class="spinner"></div>Initializing Engine...</div></div>
        <div id="console">> BOOTING...<br></div>
    </div>

    <script src="openscad.js"></script>
    
    <script>
        let scad;
        const logger = (msg) => {
            const c = document.getElementById('console');
            c.innerHTML += `> ${msg}<br>`;
            c.scrollTop = c.scrollHeight;
        };

        async function init() {
            try {
                logger("DETERMINING BASE PATH...");
                // Get the exact folder URL where this file lives
                const url = new URL(window.location.href);
                const base = url.origin + url.pathname.substring(0, url.pathname.lastIndexOf('/') + 1);
                
                logger("LOADING ENGINE...");
                scad = await openScad({
                    noInitialRun: true,
                    locateFile: (path) => {
                        // Force redirect any request for the engine to your renamed file
                        if (path.endsWith('.wasm.js') || path.endsWith('.wasm')) {
                            const target = base + "openscad.wasm";
                            console.log("Redirecting engine request to:", target);
                            return target; 
                        }
                        return base + path;
                    },
                    mainScriptUrlOrBlob: base + "openscad.js"
                });

                logger("SUCCESS: ENGINE ONLINE.");
                previewOnly(); 
            } catch (e) {
                console.error("BOOT ERROR:", e);
                logger("CRITICAL ERROR: ENGINE NOT FOUND.");
                document.getElementById('viewer').innerHTML = `
                    <div style="color: #ff4444;">
                        <h3>WASM LOAD FAILED</h3>
                        <p>1. Check if <b>openscad.wasm</b> is in repo</p>
                        <p>2. Check if <b>openscad.js</b> is in repo</p>
                        <p>See F12 Console for details</p>
                    </div>`;
            }
        }

        async function previewOnly() {
            if(!scad) return;
            const size = document.getElementById('Nut_Size').value;
            const tol = document.getElementById('Tolerance').value;
            logger(`COMPUTING: ${size}...`);

            try {
                const resp = await fetch(`./nut_generator.scad`);
                if (!resp.ok) throw new Error("SCAD file missing from GitHub");
                const rawScript = await resp.text();
                
                const finalScript = `Nut_Size = "${size}";\nTolerance = ${tol};\n${rawScript}`;
                
                // Save to virtual filesystem
                scad.FS.writeFile("/input.scad", finalScript);
                
                // Render the 3D geometry
                await scad.render("/input.scad", "/output.stl"); 
                
                document.getElementById('viewer').innerHTML = `
                    <h2 style="color:#00ff41">${size} GENERATED</h2>
                    <p style="font-size:12px;">Computed at ${tol}mm Tolerance</p>`;
                logger("READY.");
            } catch (err) {
                logger(`RENDER ERROR: ${err.message}`);
                console.error(err);
            }
        }

        async function generateAndDownload() {
            try {
                logger("PREPARING EXPORT...");
                const stlData = scad.FS.readFile("/output.stl");
                const blob = new Blob([stlData], {type: 'application/sla'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `NUTGEN.stl`;
                a.click();
                logger("DOWNLOADED.");
            } catch (e) { 
                logger("EXPORT FAILED."); 
                console.error(e);
            }
        }

        init();
    </script>
</body>
</html>
