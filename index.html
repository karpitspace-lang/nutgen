<!DOCTYPE html>
<html lang="en">
<head>
    <title>NUTGEN | Parametric Nut Generator</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { --accent: #00ff41; --bg-dark: #0a0a0a; --panel: #141414; --text: #e0e0e0; }
        body { margin: 0; font-family: 'Courier New', Courier, monospace; display: flex; height: 100vh; background: var(--bg-dark); color: var(--text); overflow: hidden; }
        
        #sidebar { width: 350px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.5); z-index: 10; }
        .header { padding: 30px 20px; border-bottom: 1px solid #222; text-align: center; }
        h1 { margin: 0; font-size: 32px; color: var(--accent); letter-spacing: 4px; text-shadow: 0 0 10px rgba(0,255,65,0.3); }
        .version { font-size: 10px; color: #666; letter-spacing: 2px; margin-top: 5px; }

        .controls { padding: 25px; flex-grow: 1; }
        .control-item { margin-bottom: 25px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        
        select, input { 
            width: 100%; padding: 12px; background: #1a1a1a; color: var(--accent); 
            border: 1px solid #333; border-radius: 2px; font-family: monospace; outline: none; box-sizing: border-box;
        }

        .actions { padding: 20px; border-top: 1px solid #222; background: #0d0d0d; }
        button { 
            width: 100%; padding: 15px; background: var(--accent); color: black; 
            border: none; font-weight: bold; cursor: pointer; text-transform: uppercase;
            transition: 0.2s; border-radius: 2px; font-size: 14px;
        }
        button:hover { background: #00cc33; box-shadow: 0 0 15px rgba(0,255,65,0.4); }

        #main-view { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #viewer { flex-grow: 1; background: #111; display: flex; align-items: center; justify-content: center; color: #444; font-size: 14px; text-align: center; }
        #console { height: 180px; background: #050505; border-top: 1px solid #222; padding: 15px; font-size: 12px; color: #008f11; overflow-y: auto; line-height: 1.5; font-family: monospace; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h1>NUTGEN</h1>
            <div class="version">V1.0.1 // ST-KERNEL</div>
        </div>

        <div class="controls">
            <div class="control-item">
                <label>Nominal Size (DIN 934)</label>
                <select id="Nut_Size">
                    <option value="M3">M3 (Metric)</option>
                    <option value="M4">M4 (Metric)</option>
                    <option value="M5">M5 (Metric)</option>
                    <option value="M6">M6 (Metric)</option>
                    <option value="M8">M8 (Metric)</option>
                    <option value="M10">M10 (Metric)</option>
                    <option value="M12">M12 (Metric)</option>
                </select>
            </div>

            <div class="control-item">
                <label>Printer Tolerance (mm)</label>
                <input type="number" id="Tolerance" value="0.15" step="0.01">
            </div>
        </div>

        <div class="actions">
            <button id="btn-generate" onclick="generateAndDownload()">Generate & Download STL</button>
        </div>
    </div>

    <div id="main-view">
        <div id="viewer">
            [ ENGINE READY ]<br><br>
            Configure parameters and click "Generate"<br>
            The STL will download automatically upon completion.
        </div>
        <div id="console">
            > SYSTEM INITIALIZING...<br>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/openscad-wasm@0.0.4/openscad.st.min.js"></script>
    
    <script>
        let scad;
        const FILE_NAME = "nut_generator.scad";

        const logger = (msg) => {
            const c = document.getElementById('console');
            c.innerHTML += `> ${msg}<br>`;
            c.scrollTop = c.scrollHeight;
        };

        async function init() {
            try {
                logger("LOADING ST-WASM KERNEL...");
                scad = await openScad({
                    noInitialRun: true,
                    locateFile: (path) => `https://cdn.jsdelivr.net/npm/openscad-wasm@0.0.4/${path}`
                });
                logger("KERNEL LOADED SUCCESSFULLY.");
                logger("READY FOR INPUT.");
            } catch (e) {
                logger("ERROR: KERNEL FAILED TO LOAD.");
                console.error(e);
            }
        }

        async function generateAndDownload() {
            const size = document.getElementById('Nut_Size').value;
            const tol = document.getElementById('Tolerance').value;
            const btn = document.getElementById('btn-generate');

            btn.disabled = true;
            btn.innerHTML = "PROCESSING...";
            logger(`FETCHING BLUEPRINT: ${FILE_NAME}`);

            try {
                const resp = await fetch(`./${FILE_NAME}`);
                if (!resp.ok) throw new Error("File not found");
                const rawScript = await resp.text();
                
                // Inject parameters
                const finalScript = `Nut_Size = "${size}";\nTolerance = ${tol};\n${rawScript}`;
                
                logger("RENDERING 3D GEOMETRY...");
                await scad.setScript(finalScript);
                
                logger("GENERATING STL BINARY...");
                const stlData = await scad.getSTL();
                
                const blob = new Blob([stlData], {type: 'application/sla'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `NUTGEN_${size}.stl`;
                a.click();
                
                logger(`SUCCESS: ${size} DOWNLOADED.`);
            } catch (err) {
                logger(`ERROR: ${err.message}`);
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Generate & Download STL";
            }
        }

        init();
    </script>
</body>
</html>
